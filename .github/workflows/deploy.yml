name: Deploy widget to GitHub Pages

# Two channels, one workflow:
#   - push to main / manual dispatch -> release channel: immutable
#     /<repo>/v<version>/ + mutable /<repo>/latest/.
#     Rebuilt only when package.json's version has no v<version> dir yet, so
#     re-pushing main without a version bump is a no-op deploy.
#     A push that *creates* the main ref, authored by GitHub's own web-flow
#     bot -- fired by "Use this template" copying this repo onto a brand-new
#     ref -- is skipped entirely instead: it would otherwise publish
#     whatever boilerplate version package.json happens to have checked in
#     and permanently spend the first-release override before anyone's done
#     real work. (Checking github.event.created alone isn't enough: a CLI
#     scaffold's own first `git push -u origin main` also creates that ref
#     for the first time, but is a real user's genuine first release and
#     must not be skipped -- the web-flow committer check tells the two
#     apart.) That run still clears any foreign content the copy brought
#     along (stray v<version>/ dirs, a root/latest/ still pointing at the
#     source repo's own path) via `cleanup-foreign`, and places the freshly
#     built showcase hub at the site root via `place-root`, so the bare
#     repo-root URL works immediately instead of 404ing until the widget's
#     real first release. It just never creates a v<version>/ or latest/.
#   - push to dev                    -> dev channel: mutable /<repo>/dev/
#     with version.json + a self-reload snippet, for live review inside Grist.
#
# All logic lives in scripts/deploy.mjs (node builtins only).
#
# One-time setup this workflow can't do for you: enable Pages (Settings ->
# Pages -> Source: Deploy from a branch -> gh-pages -> / (root); this workflow
# creates the gh-pages branch itself if missing, but Pages must be pointed at
# it once -- NOT main, which serves this repo's raw unbuilt source instead
# (symptom: a blank page with a 404 for /src/main.tsx in the browser
# console, even though this workflow reports success) and make sure Actions
# has write access (Settings -> Actions -> General -> Workflow permissions ->
# Read and write permissions).

on:
  push:
    branches: [main, dev]
  # Retire the dev URL when the `dev` branch is deleted (see `cleanup` job).
  delete:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if v<version> already exists."
        type: boolean
        required: false
        default: false

permissions:
  contents: write

# Serialize deploys onto the single shared gh-pages branch. deploy.mjs
# additionally rebases-and-retries on push, so interleaving runs never clobber.
concurrency:
  group: pages-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    # Build/publish on push + manual dispatch. The delete event is handled by `cleanup`.
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Not --frozen-lockfile, and no `cache: pnpm` above: a freshly
      # scaffolded repo never has a committed pnpm-lock.yaml (the CLI's
      # auto-commit runs before anyone's first `pnpm install`), and
      # --frozen-lockfile/cache: pnpm both hard-require one to exist —
      # found live, the very first real deploy failed with "Dependencies
      # lock file is not found". A plain install resolves fresh every run
      # regardless of whether a lockfile was ever committed.
      - name: Install dependencies
        run: pnpm install

      - name: Clone gh-pages into ./site
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" site \
            || {
              echo "gh-pages branch not found; creating an orphan."
              git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" site
              git -C site checkout --orphan gh-pages
              git -C site rm -rf . >/dev/null 2>&1 || true
              touch site/.nojekyll
            }
          git -C site config user.name  "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve deploy plan
        id: plan
        run: |
          PLAN=$(node scripts/deploy.mjs plan \
            --site site --repo "$REPO_NAME" \
            --event "${{ github.event_name }}" \
            --ref "${{ github.ref }}" \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            ${{ github.event.created == true && github.event.head_commit.committer.email == 'noreply@github.com' && '--created' || '' }})
          echo "Plan: $PLAN"
          node -e '
            const p = JSON.parse(process.argv[1]);
            const fs = require("fs");
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `context=${p.context}\n`);
            fs.appendFileSync(out, `skip=${p.skip ? "true" : "false"}\n`);
            fs.appendFileSync(out, `reason=${p.reason || ""}\n`);
            fs.appendFileSync(out, `version=${p.version || ""}\n`);
            fs.appendFileSync(out, `base=${p.base}\n`);
            fs.appendFileSync(out, `firstRelease=${p.firstRelease ? "true" : "false"}\n`);
          ' "$PLAN"

      # Also builds on the ref-created push (skip == 'true' there), but with
      # the root base plan() hands back for that case (/<repo>/, not a
      # versioned path) -- see the "landing hub" step below.
      - name: Build
        if: steps.plan.outputs.skip != 'true' || steps.plan.outputs.reason == 'ref-created'
        run: |
          pnpm exec tsc -b
          pnpm exec vite build --base "${{ steps.plan.outputs.base }}"

      - name: Place build in gh-pages tree
        if: steps.plan.outputs.skip != 'true'
        run: |
          SHA="$(git rev-parse --short HEAD)"
          VERSION_ARG=""
          [ -n "${{ steps.plan.outputs.version }}" ] && VERSION_ARG="--version ${{ steps.plan.outputs.version }}"
          node scripts/deploy.mjs place \
            --site site --repo "$REPO_NAME" \
            --channel "${{ steps.plan.outputs.context }}" $VERSION_ARG \
            --dist dist \
            --sha "$SHA" --ref "${{ github.ref }}"

      - name: Skip (already published)
        if: steps.plan.outputs.skip == 'true' && steps.plan.outputs.reason != 'ref-created'
        run: echo "== skip — v${{ steps.plan.outputs.version }} already published"

      # The ref-created "Use this template" push publishes no versioned
      # release (that would spend the first-release override on unmodified
      # boilerplate -- see plan()), so it never reaches Place. But it still:
      #   1. clears any foreign content the copy brought along
      #      (cleanupForeignVersionsIfFirstRelease, normally a side effect of
      #      Place) -- stray v<version>/ dirs, a root/latest/ pointing at the
      #      source repo's own path; then
      #   2. places the freshly built showcase hub at the site root, so
      #      https://owner.github.io/<repo>/ isn't a bare 404 until the
      #      widget's first real release (the CLI path gets a working root on
      #      its own genuine first push; this makes the template-copy path
      #      match). No v<version>/ or latest/ -- those stay absent, correctly
      #      404ing, until a real release exists.
      - name: Clean foreign content + place landing hub (ref-created push)
        if: steps.plan.outputs.reason == 'ref-created'
        run: |
          node scripts/deploy.mjs cleanup-foreign --site site --repo "$REPO_NAME"
          node scripts/deploy.mjs place-root --site site --dist dist

      - name: Finalize (versions.json + commit + push)
        run: |
          UPDATE_VERSIONS=""
          if [ "${{ steps.plan.outputs.context }}" = "release" ]; then
            UPDATE_VERSIONS="--update-versions"
          fi
          node scripts/deploy.mjs finalize \
            --site site --repo "$REPO_NAME" $UPDATE_VERSIONS --push \
            --commit-message "deploy: ${{ steps.plan.outputs.context }} @ ${{ github.sha }}"

      # On this repo's first genuine release only: prune every branch except
      # main/dev/gh-pages, and reset dev to main's current tip. Establishes
      # the schema every widget should start from (main == dev, gh-pages is
      # CI-managed only) regardless of how the repo was created -- a CLI
      # scaffold already satisfies this trivially; a repo copied via GitHub's
      # "Use this template" often doesn't (a stray inherited branch, or dev
      # tracking the source template's own unrelated preview history).
      # Placed after Finalize so it never runs if the release itself failed.
      - name: Reset branches on first genuine release
        if: steps.plan.outputs.context == 'release' && steps.plan.outputs.firstRelease == 'true'
        run: node scripts/deploy.mjs reset-branches

  cleanup:
    # When the `dev` branch is deleted, remove /dev/ so the dev URL retires
    # (404) instead of serving a stale build forever.
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (default branch — for scripts/deploy.mjs)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone gh-pages into ./site (skip if it does not exist)
        id: clone
        run: |
          if git clone --depth 1 --branch gh-pages \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" site; then
            git -C site config user.name  "github-actions[bot]"
            git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "gh-pages branch not found; nothing to clean up."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove dev dir + push
        if: steps.clone.outputs.exists == 'true'
        run: |
          node scripts/deploy.mjs remove --site site
          node scripts/deploy.mjs finalize \
            --site site --push \
            --commit-message "cleanup: retire dev URL for ${{ github.event.ref }}"
